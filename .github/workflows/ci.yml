name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Windows quality gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/runtime-requirements.txt

      - name: Use lockfile npm version
        run: npm install --global npm@11.6.2

      - name: Install Node.js dependencies
        run: npm ci

      - name: Prepare isolated Python runtime
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --disable-pip-version-check --target backend\.deps -r backend\runtime-requirements.txt

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Lint
        run: npm run lint

      - name: Run unit, integration, and browser tests
        run: npm run test:all
